name: CI/CD Pipeline
# This workflow runs Playwright tests on push and pull request events.
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test-and-deploy:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: launch unit tests
      run: npm test:unit

    - name: launch integration tests
      run: npm test:integration
    - name: launch e2e tests
      run: npm test:e2e

    - name: launch deploy
      if: success()
      run: curl -X POST "{{RENDER_DEPLOY_HOOK_RENDER}}"